<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>EcoScan | Smart City Portal</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

<style>
:root {
  --primary: #10b981;    /* Emerald 500 */
  --primary-dark: #059669;
  --secondary: #3b82f6;  /* Blue (Search) */
  --gps-btn: #8b5cf6;    /* Violet (Location) */
  --danger: #ef4444;     /* Red (Delete) */
  --bg-main: #f1f5f9;
  --card-bg: #ffffff;
  --text-head: #0f172a;
  --text-body: #475569;
}

body { 
  font-family: 'Plus Jakarta Sans', 'Inter', sans-serif; 
  margin: 0; background: var(--bg-main); color: var(--text-body);
}

h2 { 
  text-align: center; background: linear-gradient(135deg, #064e3b 0%, #10b981 100%); 
  color: white; padding: 25px; margin: 0; font-weight: 700;
  letter-spacing: -1px; box-shadow: 0 4px 15px rgba(0,0,0,0.1);
}

/* --- Tabs --- */
.tabs { display: flex; justify-content: center; background: var(--card-bg); padding: 15px; gap: 15px; border-bottom: 1px solid #e2e8f0; }
.tabs button { 
  padding: 12px 28px; border-radius: 50px; border: 2px solid transparent; 
  background: #f8fafc; color: var(--text-body); font-weight: 600; 
  cursor: pointer; transition: all 0.3s; width: auto; /* Override global button width */
}
.tabs button.active-tab { 
  background: #ecfdf5; color: var(--primary-dark); border-color: var(--primary);
  box-shadow: 0 4px 12px rgba(16, 185, 129, 0.15); transform: translateY(-2px);
}

/* --- Layout --- */
.container { display: flex; gap: 25px; padding: 25px; height: 78vh; }
#mapWaste, #mapDrain { flex: 2; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border: 1px solid #fff; }
.sidebar { flex: 1; background: var(--card-bg); padding: 25px; border-radius: 20px; overflow-y: auto; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }

/* --- Forms & Buttons --- */
input { width: 100%; margin-bottom: 12px; padding: 12px; border: 1px solid #e2e8f0; border-radius: 10px; background: #f8fafc; box-sizing: border-box;}
input:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.1); }

button { 
  border: none; border-radius: 10px; padding: 12px; font-weight: 700; cursor: pointer; 
  transition: all 0.2s; color: white; width: 100%; margin-bottom: 8px;
}
button:hover { filter: brightness(1.1); transform: translateY(-1px); }

.btn-search { background-color: var(--secondary); }
.btn-gps { background-color: var(--gps-btn); }
.btn-add { background-color: var(--primary); }
.btn-logout { background-color: #64748b; margin-top: 15px; }

/* The Fixed Delete Button */
.btn-delete { 
  background-color: #fee2e2 !important; color: #ef4444 !important;
  width: auto !important; padding: 6px 12px !important; font-size: 11px !important;
  margin: 0 !important; border: 1px solid #fecaca !important;
}
.btn-delete:hover { background-color: #ef4444 !important; color: white !important; }

/* --- Tables --- */
table { width: 100%; border-collapse: separate; border-spacing: 0 8px; }
th { text-align: left; padding: 8px; color: #94a3b8; font-size: 11px; text-transform: uppercase; }
td { background: #f8fafc; padding: 12px 8px; border-top: 1px solid #f1f5f9; border-bottom: 1px solid #f1f5f9; font-size: 13px;}
td:first-child { border-radius: 10px 0 0 10px; }
td:last-child { border-radius: 0 10px 10px 0; }

.hidden { display: none !important; }
td {
  max-width: 150px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
</style>
</head>

<body>

<h2>EcoScan</h2>

<div class="tabs">
  <button onclick="openTab('wasteTab')">🗑 Waste</button>
  <button onclick="openTab('drainTab')">🌊 Drainage</button>
  <button onclick="openTab('analysisTab')">📊 Analysis</button>
</div>

<div id="loginBox" style="max-width: 400px; margin: 50px auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1);">
  <h3 style="margin-top:0">Admin Portal</h3>
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">
  <button class="btn-add" onclick="login()">Login</button>
  <button class="btn-search" onclick="signup()">Sign Up</button>
</div>

<div id="wasteTab" class="tabContent hidden">
  <div class="container">
    <div id="mapWaste"></div>
    <div class="sidebar hidden" id="sidebarWaste">
      <input id="searchBox" placeholder="Search location...">
      <button class="btn-search" onclick="searchLocation()">🔍 Search Location</button>
      <input id="name" placeholder="Area Name">
      <div style="display:flex; gap:5px">
        <input id="lat" placeholder="Lat">
        <input id="lng" placeholder="Lng">
      </div>
      <input id="score" placeholder="Waste % (0-100)">

      <button class="btn-gps" onclick="getGPSWaste()">📍 My Location</button>
      <button class="btn-add" onclick="addArea()">✅ Add Report</button>
      <button class="btn-logout" onclick="logout()">Logout</button>

      <hr style="border:0; border-top:1px solid #eee; margin:20px 0">
      <h3>📋 Recent Reports</h3>
      <table id="wasteTable"></table>
    </div>
  </div>
</div>

<div id="drainTab" class="tabContent hidden">
  <div class="container">
    <div id="mapDrain"></div>

    <div class="sidebar hidden" id="sidebarDrain">
      <input id="drainSearchBox" placeholder="Search location...">
      <button class="btn-search" onclick="searchLocationDrain()">🔍 Search Location</button>

      <input id="drainName" placeholder="Area Name">
      <div style="display:flex; gap:5px">
        <input id="drainLat" placeholder="Lat">
        <input id="drainLng" placeholder="Lng">
      </div>
      <input id="drainage" placeholder="Blockage % (0-100)">

      <button class="btn-gps" onclick="getGPSDrain()">📍 My Location</button>
      <button class="btn-add" onclick="addDrain()">✅ Add Report</button>
      <button class="btn-logout" onclick="logout()">Logout</button>

      <hr style="border:0; border-top:1px solid #eee; margin:20px 0">
      <h3>🌊 Recent Reports</h3>
      <table id="drainTable"></table>
    </div>
  </div>
</div>
<div id="analysisTab" class="tabContent hidden" style="padding:40px; max-width:1000px; margin:auto">
  <div id="combinedAnalysis" style="background:white; padding:20px; border-radius:15px; margin-bottom:30px">Select an area to begin analysis.</div>
  
  <div style="display:flex; gap:20px; justify-content:center">
    <div style="background:white; padding:20px; border-radius:15px; flex:1">
        <h4>Waste Distribution</h4>
        <canvas id="wasteChart"></canvas>
    </div>
    <div style="background:white; padding:20px; border-radius:15px; flex:1">
        <h4>Drainage Status</h4>
        <canvas id="drainChart"></canvas>
    </div>
  </div>
</div>

<script>
/* FIREBASE CONFIG */
const firebaseConfig = {
    apiKey: "AIzaSyDVKhUv14m9-brf_JMP9Lz0RrQu5h-_Z8Y",
    authDomain: "ecoscan1-db45f.firebaseapp.com",
    projectId: "ecoscan1-db45f",
    storageBucket: "ecoscan1-db45f.firebasestorage.app",
    messagingSenderId: "957764746452",
    appId: "1:957764746452:web:fcc726e61232327ca60f41"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const auth = firebase.auth();

let mapWaste = L.map('mapWaste').setView([16.5, 80.6], 12);
let mapDrain = L.map('mapDrain').setView([16.5, 80.6], 12);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(mapWaste);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(mapDrain);
// --- Map Click Logic for Waste Tab ---
mapWaste.on('click', async function(e) {
    const lat = e.latlng.lat.toFixed(6);
    const lng = e.latlng.lng.toFixed(6);
    
    // Fill coordinates immediately
    document.getElementById("lat").value = lat;
    document.getElementById("lng").value = lng;
    
    // Reverse Geocoding: Get the address name from coordinates
    try {
        const response = await fetch(`https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${lat}&lon=${lng}`);
        const data = await response.json();
        document.getElementById("name").value = data.display_name || "Selected Location";
    } catch (error) {
        document.getElementById("name").value = `Point (${lat}, ${lng})`;
    }
});

// --- Map Click Logic for Drainage Tab ---
mapDrain.on('click', async function(e) {
    const lat = e.latlng.lat.toFixed(6);
    const lng = e.latlng.lng.toFixed(6);
    
    document.getElementById("drainLat").value = lat;
    document.getElementById("drainLng").value = lng;
    
    try {
        const response = await fetch(`https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${lat}&lon=${lng}`);
        const data = await response.json();
        document.getElementById("drainName").value = data.display_name || "Selected Location";
    } catch (error) {
        document.getElementById("drainName").value = `Point (${lat}, ${lng})`;
    }
});

let wasteMarkers = {}, drainMarkers = {};
let wasteCache = [], drainCache = [];
let wasteChart = null, drainChart = null;

/* TABLES WITH STYLED DELETE BUTTONS */
function updateWasteTable(snapshot){
  let table = document.getElementById("wasteTable");
  let rows = `<tr><th>Name</th><th>Score</th><th>Action</th></tr>`;
  snapshot.forEach(doc=>{
    let a = doc.data();
    rows += `<tr>
      <td>${escapeHtml(a.name || 'Unknown')}</td>
      <td><span style="color:var(--primary); font-weight:bold">${a.score}%</span></td>
      <td><button class="btn-delete" onclick="deleteArea('${doc.id}')">Delete</button></td>
    </tr>`;
  });
  table.innerHTML = rows;
  refreshWasteMarkers(snapshot);
}

function updateDrainTable(snapshot){
  let table = document.getElementById("drainTable");
  let rows = `<tr><th>Name</th><th>Level</th><th>Action</th></tr>`;
  snapshot.forEach(doc=>{
    let d = doc.data();
    rows += `<tr>
      <td>${escapeHtml(d.name || 'Unknown')}</td>
      <td><span style="color:var(--secondary); font-weight:bold">${d.drainage}%</span></td>
      <td><button class="btn-delete" onclick="deleteDrain('${doc.id}')">Delete</button></td>
    </tr>`;
  });
  table.innerHTML = rows;
  refreshDrainMarkers(snapshot);
}

/* TAB LOGIC */
function openTab(id) {
  // Hide all content
  document.querySelectorAll(".tabContent").forEach(t => t.classList.add("hidden"));
  // Deactivate all buttons
  document.querySelectorAll(".tabs button").forEach(b => b.classList.remove("active-tab"));
  
  // Show selected content
  const activeTab = document.getElementById(id);
  activeTab.classList.remove("hidden");
  
  // Highlight active button
  if (id === 'wasteTab') document.querySelector(".tabs button:nth-child(1)").classList.add("active-tab");
  if (id === 'drainTab') document.querySelector(".tabs button:nth-child(2)").classList.add("active-tab");
  if (id === 'analysisTab') document.querySelector(".tabs button:nth-child(3)").classList.add("active-tab");

  // Fix for maps and charts
  setTimeout(() => { 
    mapWaste.invalidateSize(); 
    mapDrain.invalidateSize();
    
    // If we just opened the analysis tab, force the charts to redraw
    if (id === 'analysisTab') {
      updateCharts();
    }
  }, 300);
}
/* AUTH & CRUD (Condensed for space, keep your original logic) */
auth.onAuthStateChanged(user=>{
  if(user){
    document.getElementById("loginBox").classList.add("hidden");
    document.getElementById("sidebarWaste").classList.remove("hidden");
    document.getElementById("sidebarDrain").classList.remove("hidden");
    openTab('wasteTab');
    loadTables();
  } else {
    document.getElementById("loginBox").classList.remove("hidden");
    document.querySelectorAll(".tabContent").forEach(t => t.classList.add("hidden"));
  }
});

function login(){ auth.signInWithEmailAndPassword(document.getElementById("email").value, document.getElementById("password").value).catch(e=>alert(e.message)); }
function signup(){ auth.createUserWithEmailAndPassword(document.getElementById("email").value, document.getElementById("password").value).catch(e=>alert(e.message)); }
function logout(){ auth.signOut(); }

function loadTables(){
  db.collection("waste").onSnapshot(snap => { wasteCache = snap.docs.map(d=>d.data()); updateWasteTable(snap); });
  db.collection("drainage").onSnapshot(snap => { drainCache = snap.docs.map(d=>d.data()); updateDrainTable(snap); });
}

function addArea(){
  const nameField = document.getElementById("name");
  const latField = document.getElementById("lat");
  const lngField = document.getElementById("lng");
  const scoreField = document.getElementById("score");

  const data = { 
    name: nameField.value, 
    lat: parseFloat(latField.value), 
    lng: parseFloat(lngField.value), 
    score: parseFloat(scoreField.value) 
  };

  if(!data.name || isNaN(data.lat) || isNaN(data.score)) return alert("Please fill all fields, including Waste %");

  db.collection("waste").add(data).then(() => {
    // Clear all fields for the next entry
    nameField.value = '';
    latField.value = '';
    lngField.value = '';
    scoreField.value = '';
    alert("Waste report added successfully!");
  });
}
function addDrain(){
  const nameField = document.getElementById("drainName");
  const latField = document.getElementById("drainLat");
  const lngField = document.getElementById("drainLng");
  const scoreField = document.getElementById("drainage");

  const data = { 
    name: nameField.value, 
    lat: parseFloat(latField.value), 
    lng: parseFloat(lngField.value), 
    drainage: parseFloat(scoreField.value) 
  };

  if(!data.name || isNaN(data.lat) || isNaN(data.drainage)) return alert("Please fill all fields, including Blockage %");

  db.collection("drainage").add(data).then(() => {
    // Clear all fields for the next entry
    nameField.value = '';
    latField.value = '';
    lngField.value = '';
    scoreField.value = '';
    alert("Drainage report added successfully!");
  });
}
function deleteArea(id){ if(confirm("Delete this report?")) db.collection("waste").doc(id).delete(); }
function deleteDrain(id){ if(confirm("Delete this report?")) db.collection("drainage").doc(id).delete(); }

/* HELPER: Search & Markers */
async function searchLocation(){
  let q = document.getElementById("searchBox").value;
  let res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${q}`);
  let data = await res.json();
  if(data.length) latInput(parseFloat(data[0].lat), parseFloat(data[0].lon), data[0].display_name, 'waste');
}
async function searchLocationDrain(){
  let q = document.getElementById("drainSearchBox").value;
  if(!q) return alert("Please enter a location to search");

  try {
    let res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${q}`);
    let data = await res.json();
    
    if(data.length) {
      // We pass 'drain' as the target so latInput knows which fields to fill
      latInput(parseFloat(data[0].lat), parseFloat(data[0].lon), data[0].display_name, 'drain');
    } else {
      alert("Location not found");
    }
  } catch (error) {
    console.error("Search error:", error);
  }
}

function latInput(lat, lon, name, target){
  if(target === 'waste'){
    document.getElementById("lat").value = lat; 
    document.getElementById("lng").value = lon; 
    document.getElementById("name").value = name;
    mapWaste.setView([lat, lon], 14);
  } else {
    // This part handles the Drainage tab
    document.getElementById("drainLat").value = lat; 
    document.getElementById("drainLng").value = lon; 
    document.getElementById("drainName").value = name;
    mapDrain.setView([lat, lon], 14);
  }
}
function getGPSWaste(){ navigator.geolocation.getCurrentPosition(p=>latInput(p.coords.latitude, p.coords.longitude, "My Location", 'waste')); }
function getGPSDrain(){ navigator.geolocation.getCurrentPosition(p=>latInput(p.coords.latitude, p.coords.longitude, "My Location", 'drain')); }

function refreshWasteMarkers(snap){
  snap.forEach(doc=>{
    const d = doc.data();
    if(wasteMarkers[doc.id]) mapWaste.removeLayer(wasteMarkers[doc.id]);
    wasteMarkers[doc.id] = L.circleMarker([d.lat, d.lng], {radius:8, color: d.score > 40 ? 'red' : 'green'}).addTo(mapWaste);
  });
}
function refreshDrainMarkers(snap){
  snap.forEach(doc=>{
    const d = doc.data();
    if(drainMarkers[doc.id]) mapDrain.removeLayer(drainMarkers[doc.id]);
    drainMarkers[doc.id] = L.circleMarker([d.lat, d.lng], {radius:8, color: d.drainage > 50 ? 'red' : 'blue'}).addTo(mapDrain);
  });
}

function escapeHtml(s){ return s.toString().replace(/&/g,"&amp;").replace(/</g,"&lt;"); }
function updateCharts() {
    const wasteCanvas = document.getElementById('wasteChart');
    const drainCanvas = document.getElementById('drainChart');
    
    if (!wasteCanvas || !drainCanvas) return;

    const wasteCtx = wasteCanvas.getContext('2d');
    const drainCtx = drainCanvas.getContext('2d');

    // Destroy existing charts if they exist to prevent hover glitches
    if (wasteChart) wasteChart.destroy();
    if (drainChart) drainChart.destroy();

    // Waste Chart (Bar Chart of Scores)
    wasteChart = new Chart(wasteCtx, {
        type: 'bar',
        data: {
            labels: wasteCache.map(d => (d.name ? d.name.substring(0, 10) + '...' : 'Unknown')),
            datasets: [{
                label: 'Waste Level %',
                data: wasteCache.map(d => d.score || 0),
                backgroundColor: '#10b981'
            }]
        },
        options: { responsive: true }
    });

    // Drainage Chart Logic: Calculate safe average
    const avgBlockage = drainCache.length > 0 
        ? drainCache.reduce((acc, curr) => acc + (parseFloat(curr.drainage) || 0), 0) / drainCache.length 
        : 0;

    drainChart = new Chart(drainCtx, {
        type: 'doughnut',
        data: {
            labels: ['Blocked', 'Clear'],
            datasets: [{
                data: [avgBlockage, 100 - avgBlockage],
                backgroundColor: ['#ef4444', '#3b82f6']
            }]
        },
        options: { responsive: true }
    });

    // Summary Text
    document.getElementById('combinedAnalysis').innerHTML = `
        <h3>City Health Overview</h3>
        <p>Monitoring <b>${wasteCache.length}</b> waste zones and <b>${drainCache.length}</b> drainage points.</p>
    `;
}
// Update the loadTables function to call updateCharts
function loadTables(){
  db.collection("waste").onSnapshot(snap => { 
      wasteCache = snap.docs.map(d=>d.data()); 
      updateWasteTable(snap); 
      updateCharts(); // Added
  });
  db.collection("drainage").onSnapshot(snap => { 
      drainCache = snap.docs.map(d=>d.data()); 
      updateDrainTable(snap); 
      updateCharts(); // Added
  });
}

</script>
</body>
</html>
